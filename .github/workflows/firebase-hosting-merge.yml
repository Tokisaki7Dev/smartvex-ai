name: Deploy to Firebase Hosting and Rules on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMARTVEX_AI }}'
          channelId: live
          projectId: smartvex-ai
      - name: Deploy rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore,storage,database
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMARTVEX_AI }}
